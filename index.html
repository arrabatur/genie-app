<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Génie</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#06031f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Génie">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      height: 100dvh;
      overflow: hidden;
      background: radial-gradient(ellipse at 50% 60%, #1a0a3e 0%, #06031f 70%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #fff;
    }

    /* ── Stars ─────────────────────────────── */
    #stars { position: fixed; inset: 0; pointer-events: none; }
    .star {
      position: absolute;
      background: #fff;
      border-radius: 50%;
      animation: twinkle var(--d) ease-in-out infinite var(--dl);
    }
    @keyframes twinkle {
      0%, 100% { opacity: .15; transform: scale(1); }
      50%       { opacity: .9;  transform: scale(1.5); }
    }

    /* ── Sparkles (CSS-only) ────────────────── */
    .sparkles { position: absolute; inset: 0; pointer-events: none; }
    .sp {
      position: absolute;
      width: 6px; height: 6px;
      background: #ffd700;
      clip-path: polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);
      animation: sp-float var(--sd) ease-in-out infinite var(--sdl);
      opacity: 0;
    }
    @keyframes sp-float {
      0%   { opacity: 0;   transform: translateY(0)    scale(.6) rotate(0deg); }
      30%  { opacity: .9; }
      100% { opacity: 0;   transform: translateY(-70px) scale(1.2) rotate(180deg); }
    }

    /* ── Genie composition ──────────────────── */
    .stage {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: entrance 1.2s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes entrance {
      from { opacity: 0; transform: translateY(40px) scale(.85); }
      to   { opacity: 1; transform: translateY(0)    scale(1); }
    }

    /* Outer glow ring */
    .aura {
      position: absolute;
      top: -20px; left: 50%; transform: translateX(-50%);
      width: 200px; height: 200px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(124,58,237,.35) 0%, transparent 68%);
      animation: aura-pulse 3s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes aura-pulse {
      0%, 100% { transform: translateX(-50%) scale(1);   opacity: .7; }
      50%       { transform: translateX(-50%) scale(1.25); opacity: 1; }
    }

    /* Face orb */
    .orb {
      position: relative; z-index: 2;
      width: 100px; height: 100px;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 32%, #c4b5fd, #7c3aed 48%, #2e0a6e);
      border: 2.5px solid rgba(196,181,253,.4);
      box-shadow:
        0 0 0 8px  rgba(124,58,237,.12),
        0 0 40px   rgba(124,58,237,.55),
        0 0 100px  rgba(124,58,237,.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 56px;
      line-height: 1;
      animation: float 4s ease-in-out infinite;
      user-select: none;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0)    rotate(-2deg); }
      50%       { transform: translateY(-12px) rotate(2deg); }
    }

    /* Smoke trail */
    .smoke {
      position: relative; z-index: 1;
      width: 60px; height: 50px;
      margin-top: -12px;
      flex-shrink: 0;
    }
    .smoke span {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(139,92,246,.5) 0%, transparent 70%);
      bottom: 0; left: 50%;
      animation: rise var(--dur) ease-out infinite var(--del);
    }
    @keyframes rise {
      0%   { transform: translateX(calc(-50%)) translateY(0)     scale(.3); opacity: .7; }
      100% { transform: translateX(calc(-50% + var(--dx))) translateY(-75px) scale(1.8); opacity: 0; }
    }

    /* Lamp */
    .lamp {
      font-size: 34px;
      position: relative; z-index: 2;
      margin-top: -6px;
      animation: lamp-glow 2.5s ease-in-out infinite;
      filter: drop-shadow(0 0 12px rgba(255,215,0,.7));
    }
    @keyframes lamp-glow {
      0%, 100% { filter: drop-shadow(0 0  8px rgba(255,215,0,.5)); }
      50%       { filter: drop-shadow(0 0 22px rgba(255,215,0,1)); }
    }

    /* Title */
    .title {
      margin-top: 14px;
      font-size: 32px;
      font-weight: 800;
      letter-spacing: 6px;
      text-transform: uppercase;
      background: linear-gradient(135deg, #ffd700, #fff8b0, #ffd700);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 14px rgba(255,215,0,.5));
      animation: title-glow 3s ease-in-out infinite;
    }
    @keyframes title-glow {
      0%, 100% { filter: drop-shadow(0 0 10px rgba(255,215,0,.4)); }
      50%       { filter: drop-shadow(0 0 24px rgba(255,215,0,.8)); }
    }

    .subtitle {
      margin-top: 8px;
      font-size: 14px;
      letter-spacing: 3px;
      color: rgba(196,181,253,.7);
      text-transform: uppercase;
    }

    /* ── Mode buttons ───────────────────────── */
    .mode-buttons {
      margin-top: 18px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 16px;
    }

    .btn-mode {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 16px 28px;
      border: none;
      border-radius: 18px;
      cursor: pointer;
      font-family: inherit;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      transition: transform .18s ease, box-shadow .18s ease;
      text-decoration: none;
    }
    .btn-mode:active { transform: scale(.95); }

    .btn-mode .btn-icon { font-size: 32px; line-height: 1; }
    .btn-mode .btn-label { font-size: 13px; }

    .btn-enfant {
      background: linear-gradient(135deg, #f9a8d4, #ec4899);
      color: #fff;
      box-shadow: 0 4px 20px rgba(236,72,153,.45);
    }
    .btn-enfant:hover { box-shadow: 0 6px 28px rgba(236,72,153,.7); transform: translateY(-2px); }

    .btn-adulte {
      background: linear-gradient(135deg, #a78bfa, #7c3aed);
      color: #fff;
      box-shadow: 0 4px 20px rgba(124,58,237,.45);
    }
    .btn-adulte:hover { box-shadow: 0 6px 28px rgba(124,58,237,.7); transform: translateY(-2px); }

    /* ── Grow button ────────────────────────── */
    .btn-grow {
      display: inline-block;
      margin-top: 16px;
      padding: 14px 28px;
      border-radius: 50px;
      font-family: inherit;
      font-weight: 700;
      font-size: 15px;
      text-decoration: none;
      color: #ffd700;
      border: 1.5px solid rgba(255,215,0,0.4);
      background: rgba(255,215,0,0.08);
      backdrop-filter: blur(8px);
      letter-spacing: 0.3px;
      white-space: nowrap;
      transition: background .18s ease, box-shadow .18s ease;
    }
    .btn-grow:hover {
      background: rgba(255,215,0,0.18);
      box-shadow: 0 0 24px rgba(255,215,0,0.3);
    }

    /* ── Canal+ scramble overlay ────────────── */
    #canal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #000;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: 60px;
    }
    #canal-overlay.active { display: flex; }

    #scramble-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .canal-badge {
      position: absolute;
      top: 20px;
      left: 20px;
      background: #fff;
      color: #000;
      font-weight: 900;
      font-size: 18px;
      padding: 4px 12px;
      border-radius: 4px;
      letter-spacing: 2px;
      z-index: 2;
      font-family: Arial Black, sans-serif;
    }

    .canal-badge span { color: #e8000d; }

    .canal-msg {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 2;
      pointer-events: none;
    }
    .canal-msg p {
      font-size: 13px;
      color: rgba(255,255,255,.55);
      letter-spacing: 2px;
      text-transform: uppercase;
      text-shadow: 0 0 10px #000;
    }
    .canal-msg .lock { font-size: 48px; }

    #btn-leon {
      position: relative;
      z-index: 3;
      background: linear-gradient(135deg, #e8000d, #ff4444);
      color: #fff;
      border: none;
      border-radius: 14px;
      padding: 18px 32px;
      font-size: 16px;
      font-weight: 800;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: .5px;
      box-shadow: 0 4px 24px rgba(232,0,13,.6);
      animation: leon-pulse 1.8s ease-in-out infinite;
      max-width: 320px;
      text-align: center;
      line-height: 1.4;
    }
    @keyframes leon-pulse {
      0%, 100% { box-shadow: 0 4px 24px rgba(232,0,13,.6); transform: scale(1); }
      50%       { box-shadow: 0 4px 40px rgba(232,0,13,.95); transform: scale(1.04); }
    }

    #btn-close-canal {
      position: absolute;
      top: 16px;
      right: 16px;
      z-index: 4;
      background: rgba(255,255,255,.15);
      border: 1px solid rgba(255,255,255,.3);
      color: #fff;
      font-size: 22px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }
  </style>
</head>
<body>

<div id="stars"></div>

<div class="stage">
  <div class="sparkles" id="sparkles"></div>
  <div class="aura"></div>

  <div class="orb">🧞</div>

  <div class="smoke">
    <span style="width:16px;height:16px;--dur:1.9s;--del:0s;   --dx:-14px"></span>
    <span style="width:22px;height:22px;--dur:2.3s;--del:.35s; --dx: 10px"></span>
    <span style="width:13px;height:13px;--dur:1.7s;--del:.7s;  --dx: 20px"></span>
    <span style="width:19px;height:19px;--dur:2.1s;--del:1.05s;--dx: -7px"></span>
    <span style="width:15px;height:15px;--dur:2s;  --del:1.4s; --dx: 14px"></span>
    <span style="width:11px;height:11px;--dur:1.8s;--del:1.75s;--dx: -3px"></span>
  </div>

  <div class="lamp">🪔</div>

  <p class="title">Génie</p>
  <p class="subtitle">Ton assistant magique</p>

  <div class="mode-buttons">
    <a href="enfant.html" class="btn-mode btn-enfant">
      <span class="btn-icon">🧒</span>
      <span class="btn-label">Enfant</span>
    </a>
    <button onclick="openCanal()" class="btn-mode btn-adulte">
      <span class="btn-icon">🧑</span>
      <span class="btn-label">Adulte</span>
    </button>
  </div>

  <a href="grandir.html" class="btn-grow">
    🥶 Habiller mon génie y fait froid
  </a>

</div>

<script src="js/stars.js"></script>

<!-- Canal+ scramble overlay -->
<div id="canal-overlay">
  <canvas id="scramble-canvas"></canvas>

  <div class="canal-badge">CANAL<span>+</span></div>

  <button id="btn-close-canal" onclick="closeCanal()">✕</button>

  <div class="canal-msg">
    <div class="lock">🔒</div>
    <p>Cette chaîne est cryptée</p>
    <p>Abonnez-vous pour regarder</p>
  </div>

  <button id="btn-leon" onclick="closeCanal()">
    yes leon le putaclic du business il est là 🤝
  </button>
</div>

<script>
  // ── Scramble effect ──────────────────────────────
  const canvas  = document.getElementById('scramble-canvas');
  const ctx     = canvas.getContext('2d');
  let   animId  = null;

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  function drawScramble() {
    const W = canvas.width, H = canvas.height;

    // base noisy "film" frame
    const img = ctx.createImageData(W, H);
    const d   = img.data;
    for (let i = 0; i < d.length; i += 4) {
      const v = Math.random() * 255 | 0;
      d[i]   = v;
      d[i+1] = v * .6 | 0;
      d[i+2] = v * .3 | 0;
      d[i+3] = 255;
    }
    ctx.putImageData(img, 0, 0);

    // horizontal scramble bands (classic Canal+ look)
    const bands = 18 + Math.random() * 12 | 0;
    for (let b = 0; b < bands; b++) {
      const y   = Math.random() * H | 0;
      const h   = (4 + Math.random() * 40) | 0;
      const dx  = (Math.random() - .5) * W * .6 | 0;
      ctx.drawImage(canvas, 0, y, W, h, dx, y, W, h);
    }

    // scanlines
    ctx.fillStyle = 'rgba(0,0,0,0.18)';
    for (let y = 0; y < H; y += 2) {
      ctx.fillRect(0, y, W, 1);
    }

    // vignette
    const vgr = ctx.createRadialGradient(W/2,H/2,H*.25, W/2,H/2,H*.85);
    vgr.addColorStop(0, 'rgba(0,0,0,0)');
    vgr.addColorStop(1, 'rgba(0,0,0,0.75)');
    ctx.fillStyle = vgr;
    ctx.fillRect(0, 0, W, H);

    animId = requestAnimationFrame(drawScramble);
  }

  function openCanal() {
    resize();
    document.getElementById('canal-overlay').classList.add('active');
    drawScramble();
  }

  function closeCanal() {
    document.getElementById('canal-overlay').classList.remove('active');
    cancelAnimationFrame(animId);
  }

  window.addEventListener('resize', resize);
  window.addEventListener('pageshow', closeCanal);
</script>
</body>
</html>
