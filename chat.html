<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Assistant — Génie</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#06031f">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      height: 100dvh;
      display: flex;
      flex-direction: column;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: radial-gradient(ellipse at 50% 60%, #1a0a3e 0%, #06031f 70%);
      color: #fff;
    }

    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      flex-shrink: 0;
    }
    .back-btn {
      font-size: 22px;
      text-decoration: none;
      color: #a78bfa;
      padding: 4px;
    }
    .header-text h1 { font-size: 18px; font-weight: 800; color: #fff; }
    .header-text p  { font-size: 12px; color: rgba(255,255,255,0.45); margin-top: 2px; }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    #welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
      gap: 12px;
    }
    #welcome h2 { font-size: 22px; font-weight: 800; }
    #welcome p  { font-size: 14px; color: rgba(255,255,255,0.5); line-height: 1.6; }
    .suggest-grid {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      max-width: 400px;
      margin-top: 16px;
    }
    .suggest-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 14px;
      cursor: pointer;
      text-align: left;
      color: rgba(255,255,255,0.8);
      font-family: inherit;
      transition: background .15s;
    }
    .suggest-btn:hover { background: rgba(255,255,255,0.1); }

    .msg-row { display: flex; align-items: flex-end; gap: 8px; }
    .msg-row.user { justify-content: flex-end; }
    .msg-row.bot  { justify-content: flex-start; }
    .bot-avatar { font-size: 22px; flex-shrink: 0; margin-bottom: 2px; }
    .bubble {
      max-width: 72%;
      border-radius: 18px;
      padding: 12px 14px;
      font-size: 15px;
      line-height: 1.5;
    }
    .bubble-user { background: #7c3aed; color: #fff; border-bottom-right-radius: 4px; }
    .bubble-bot  {
      background: rgba(255,255,255,0.07);
      color: rgba(255,255,255,0.9);
      border-bottom-left-radius: 4px;
      border-left: 2px solid #ffd700;
    }

    .typing-dots { display: flex; gap: 5px; padding: 4px 2px; }
    .dot {
      width: 8px; height: 8px;
      background: #ffd700;
      border-radius: 50%;
      animation: dot-pulse 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }
    @keyframes dot-pulse {
      0%, 100% { opacity: .3; transform: scale(.8); }
      50%       { opacity: 1;  transform: scale(1.2); }
    }

    #input-bar {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      padding: 10px 14px;
      background: rgba(255,255,255,0.04);
      border-top: 1px solid rgba(255,255,255,0.1);
      flex-shrink: 0;
    }
    #input {
      flex: 1;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 22px;
      padding: 10px 16px;
      font-size: 15px;
      font-family: inherit;
      color: #fff;
      resize: none;
      max-height: 120px;
      outline: none;
    }
    #input::placeholder { color: rgba(255,255,255,0.3); }
    #send-btn {
      width: 42px; height: 42px;
      border-radius: 50%;
      background: #ffd700;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
      transition: opacity .15s;
    }
    #send-btn:disabled { opacity: .4; cursor: default; }
  </style>
</head>
<body>

<header>
  <a href="index.html" class="back-btn">←</a>
  <div class="header-text">
    <h1>🧞 Assistant</h1>
    <p>Pose n'importe quelle question</p>
  </div>
</header>

<div id="welcome">
  <div style="font-size:56px">🧞</div>
  <h2>Bonjour !</h2>
  <p>Je peux répondre à toutes tes questions.<br>Par où on commence ?</p>
  <div class="suggest-grid">
    <button class="suggest-btn" onclick="sendMsg(this.textContent)">Explique-moi comment fonctionne l'IA 🤖</button>
    <button class="suggest-btn" onclick="sendMsg(this.textContent)">Donne-moi une recette rapide pour ce soir 🍽️</button>
    <button class="suggest-btn" onclick="sendMsg(this.textContent)">Comment apprendre une nouvelle langue efficacement ? 🌍</button>
  </div>
</div>

<div id="messages" style="display:none"></div>

<div id="input-bar">
  <textarea id="input" placeholder="Écris ta question…" rows="1" maxlength="1000"></textarea>
  <button id="send-btn" onclick="sendMsg()" disabled>➤</button>
</div>

<script>
  const API = window.location.hostname === 'localhost'
    ? 'http://localhost:3001/api/chat'
    : 'https://genie-app-1.onrender.com/api/chat';

  const history = [];
  const welcomeEl  = document.getElementById('welcome');
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('input');
  const sendBtn    = document.getElementById('send-btn');

  inputEl.addEventListener('input', () => {
    sendBtn.disabled = !inputEl.value.trim();
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  });
  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
  });

  function showChat() {
    welcomeEl.style.display = 'none';
    messagesEl.style.display = 'flex';
  }

  function addBubble(role, content) {
    const row = document.createElement('div');
    row.className = `msg-row ${role}`;
    if (role === 'bot') {
      const av = document.createElement('span');
      av.className = 'bot-avatar';
      av.textContent = '🧞';
      row.appendChild(av);
    }
    const bub = document.createElement('div');
    bub.className = `bubble bubble-${role}`;
    bub.textContent = content;
    row.appendChild(bub);
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function addTyping() {
    const row = document.createElement('div');
    row.className = 'msg-row bot';
    row.id = 'typing';
    const av = document.createElement('span');
    av.className = 'bot-avatar';
    av.textContent = '🧞';
    row.appendChild(av);
    const bub = document.createElement('div');
    bub.className = 'bubble bubble-bot';
    bub.innerHTML = '<div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
    row.appendChild(bub);
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  async function sendMsg(text) {
    const msg = (text ?? inputEl.value).trim();
    if (!msg) return;

    showChat();
    addBubble('user', msg);
    history.push({ role: 'user', content: msg });

    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;
    addTyping();

    try {
      const res = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history }),
      });
      const data = await res.json();
      const reply = res.ok ? data.content : (data.error ?? 'Erreur');
      document.getElementById('typing')?.remove();
      addBubble('bot', reply);
      history.push({ role: 'assistant', content: reply });
    } catch {
      document.getElementById('typing')?.remove();
      addBubble('bot', 'Je suis indisponible pour l\'instant, réessaie dans un instant ✨');
    }
  }
</script>
</body>
</html>
